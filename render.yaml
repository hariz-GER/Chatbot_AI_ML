services:
  - type: web
    name: chatbot-server
    runtime: docker
    dockerfilePath: ./server/Dockerfile
    dockerContext: ./server
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: GEMINI_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: chatbot-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false
    healthCheckPath: /health
    autoDeploy: true
    plan: starter

  - type: web
    name: chatbot-client
    runtime: docker
    dockerfilePath: ./client/Dockerfile
    dockerContext: ./client
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        sync: false
    autoDeploy: true
    plan: starter

databases:
  - name: chatbot-db
    plan: starter
    databaseName: chatbot_db
    user: chatbot_user
