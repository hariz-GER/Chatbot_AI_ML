name: PR Checks

on:
  pull_request:
    branches: [main, master]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json

      - name: Install server dependencies
        run: npm ci
        working-directory: ./server

      - name: Install client dependencies
        run: npm ci
        working-directory: ./client

      - name: TypeScript check - Server
        run: npx tsc --noEmit
        working-directory: ./server

      - name: TypeScript check - Client
        run: npx tsc --noEmit
        working-directory: ./client

      - name: Lint - Client
        run: npm run lint
        working-directory: ./client

  build-test:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json

      - name: Install and Build Server
        run: |
          npm ci
          npm run build
        working-directory: ./server

      - name: Install and Build Client
        run: |
          npm ci
          npm run build
        working-directory: ./client
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000

      - name: Build Success
        run: echo "✅ All builds completed successfully!"

  docker-build-test:
    runs-on: ubuntu-latest
    needs: build-test
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Server Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: false
          tags: chatbot-server:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Client Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: false
          tags: chatbot-client:test
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:4000
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker Build Success
        run: echo "🐳 Docker images built successfully!"
